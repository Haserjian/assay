# Assay Comparability Contract: LLM-as-Judge v2-draft
#
# Amendment from v1: judge_temperature severity changed from
# INVALIDATING to DEGRADING.
#
# Rationale for amendment: Temperature changes affect score variance
# but don't change the measurement instrument itself. Two runs at
# temperature 0.0 and 0.3 use the same model, same prompt, same rubric.
# The scores are noisier but not from a fundamentally different
# instrument. This is a legitimate policy position that some operators
# may prefer.
#
# This draft exists to test contract diffing infrastructure. It
# demonstrates that a single severity change can flip verdicts on
# existing evidence.

comparability_contract:
  version: "0.2.0-draft"
  id: "judge-comparability-v2-draft"
  name: "LLM-as-Judge Comparability v2 (draft)"
  domain: "llm_as_judge"
  author: "assay"
  created_at: "2026-03-28"
  amends: "judge-comparability-v1"
  amendment_summary: "judge_temperature: INVALIDATING -> DEGRADING"

  scope:
    description: >
      Governs whether two LLM-as-judge evaluation runs produce
      structurally comparable evidence. A DENIED verdict means the
      score delta cannot be attributed to the evaluated system.
    metric_family: "judge_scored"

  parity_fields:

    # --- Instrument Identity ---

    - field: judge_model
      match_rule: exact
      severity: INVALIDATING
      group: instrument_identity
      rationale: >
        Different models have different scoring distributions.
        Cross-model score deltas are meaningless.
      requirement: REQUIRED

    - field: judge_model_version
      match_rule: exact
      severity: INVALIDATING
      group: instrument_identity
      rationale: >
        Model version updates can silently shift scoring behavior.
        A version change is an instrument change.
      requirement: REQUIRED

    - field: judge_prompt_template
      match_rule: content_hash
      severity: INVALIDATING
      group: instrument_identity
      rationale: >
        Prompt changes directly alter scoring criteria.
        Deltas reflect prompt change, not system change.
      requirement: REQUIRED

    - field: judge_system_prompt
      match_rule: content_hash
      severity: INVALIDATING
      group: instrument_identity
      rationale: >
        System prompt changes alter judge behavior globally.
      requirement: REQUIRED

    - field: scoring_rubric
      match_rule: content_hash
      severity: INVALIDATING
      group: instrument_identity
      rationale: >
        Rubric defines what scores mean. Changed rubric = changed
        measurement instrument.
      requirement: REQUIRED

    - field: score_type
      match_rule: exact
      severity: INVALIDATING
      group: instrument_identity
      rationale: >
        Likert vs. binary vs. continuous produce incomparable evidence.
      requirement: REQUIRED

    - field: score_range
      match_rule: exact
      severity: INVALIDATING
      group: instrument_identity
      rationale: >
        1-5 vs. 1-10 vs. 0-100 are different instruments.
      requirement: REQUIRED

    # --- Execution Parameters ---

    # AMENDMENT: severity changed from INVALIDATING to DEGRADING
    - field: judge_temperature
      match_rule: exact
      severity: DEGRADING
      group: execution_params
      rationale: >
        Temperature affects score variance but does not change the
        measurement instrument. Runs at different temperatures use the
        same model and rubric; the scores are noisier, not from a
        fundamentally different instrument.
      requirement: REQUIRED

    - field: judge_max_tokens
      match_rule: exact
      severity: DEGRADING
      group: execution_params
      rationale: >
        Token limit can truncate judge reasoning, potentially
        affecting scores.
      requirement: REQUIRED

    - field: judge_top_p
      match_rule: exact
      severity: DEGRADING
      group: execution_params
      rationale: >
        Sampling parameter change affects output distribution.
      requirement: REQUIRED

    - field: judge_passes
      match_rule: exact
      severity: INVALIDATING
      group: execution_params
      rationale: >
        Single-pass vs. consensus scoring produces structurally
        different evidence.
      requirement: REQUIRED

    # --- Evaluation Surface ---

    - field: eval_dataset
      match_rule: content_hash
      severity: INVALIDATING
      group: eval_surface
      rationale: >
        Different inputs = different test. Score deltas are not
        attributable.
      requirement: REQUIRED

    - field: eval_dataset_version
      match_rule: exact
      severity: INVALIDATING
      group: eval_surface
      rationale: >
        Dataset version changes may alter difficulty, distribution,
        or coverage.
      requirement: REQUIRED

    - field: presentation_order
      match_rule: exact
      severity: DEGRADING
      group: eval_surface
      rationale: >
        Position bias in judge models is well-documented.
      requirement: REQUIRED

    - field: input_format
      match_rule: content_hash
      severity: DEGRADING
      group: eval_surface
      rationale: >
        Formatting changes can affect judge interpretation of responses.
      requirement: REQUIRED

  outcomes:
    SATISFIED: >
      All parity fields match. Comparison is valid. Claims may proceed.
    DOWNGRADED: >
      One or more DEGRADING mismatches. Comparison is weakened.
      Claims require explicit caveat.
    DENIED: >
      One or more INVALIDATING mismatches. Comparison is structurally
      invalid. Claims are inadmissible.
    UNDETERMINED: >
      Required fields are missing from one or both evidence bundles.
      Contract cannot be evaluated.

  out_of_scope:
    - "Statistical significance of score deltas"
    - "Whether the judge model is well-calibrated"
    - "Whether the rubric is good"
    - "Whether the evaluated system is actually better"
    - "Evidence quality beyond structural comparability"
    - "Temporal claim decay"
