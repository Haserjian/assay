name: vendorq

on:
  pull_request:
    paths:
      - "src/assay/vendorq_*.py"
      - "src/assay/schemas/vendorq.*.json"
      - "tests/assay/test_vendorq_*.py"
      - "examples/vendorq/**"
      - ".github/workflows/vendorq.yml"
  push:
    branches: [main]
    paths:
      - "src/assay/vendorq_*.py"
      - "src/assay/schemas/vendorq.*.json"
      - "tests/assay/test_vendorq_*.py"

permissions:
  contents: read

jobs:
  vendorq-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run VendorQ tests
        run: |
          pytest tests/assay/test_vendorq_ingest.py \
                 tests/assay/test_vendorq_compile.py \
                 tests/assay/test_vendorq_lock.py \
                 tests/assay/test_vendorq_verify.py \
                 tests/assay/test_vendorq_export.py \
                 -v --tb=short

      - name: Run VendorQ gold demo
        run: bash examples/vendorq/verify.sh
